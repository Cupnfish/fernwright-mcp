<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Playwright MCP Tab Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, sans-serif;
        line-height: 1.4;
      }

      body {
        margin: 24px;
        max-width: 760px;
      }

      h1 {
        margin-top: 0;
      }

      .row {
        margin-bottom: 16px;
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px 0 18px;
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 12px;
        font-weight: 600;
      }

      .badge.connected {
        background: #dcfce7;
        color: #166534;
      }

      .badge.connecting {
        background: #fef3c7;
        color: #92400e;
      }

      .badge.disconnected {
        background: #fee2e2;
        color: #991b1b;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input[type="url"] {
        width: 100%;
        padding: 8px;
        font-size: 14px;
      }

      .buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        padding: 8px 12px;
        font-size: 14px;
      }

      .meta {
        color: #475569;
        font-size: 13px;
      }

      #status {
        margin-top: 12px;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background-color: #f8fafc;
        white-space: pre-wrap;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Playwright MCP Tab Bridge Settings</h1>

    <div class="status-bar">
      <span id="stateBadge" class="badge disconnected">Checking...</span>
      <span id="statusSummary" class="meta">Loading status...</span>
    </div>

    <div class="row">
      <label for="serverUrl">Bridge WebSocket URL</label>
      <input id="serverUrl" type="url" placeholder="ws://127.0.0.1:17373" />
      <div class="meta">This URL must match the Rust MCP server listener.</div>
    </div>

    <div class="row buttons">
      <button id="saveButton" type="button">Save URL</button>
      <button id="reconnectButton" type="button">Reconnect</button>
      <button id="refreshStatusButton" type="button">Refresh now</button>
      <button id="syncTabsButton" type="button">Sync tabs</button>
    </div>

    <div class="meta" id="lastUpdate">Last update: never</div>
    <pre id="status"></pre>

    <script src="options.js" type="module"></script>
  </body>
</html>
